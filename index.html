<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이니치데스노트</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6fa; --surface:#fff; --surface2:#f0f1f5; --border:#e2e4ec;
  --text:#1e1f2e; --muted:#9395a5; --accent:#6c63ff; --blue:#3b82f6;
  --gold:#f59e0b; --green:#22c55e;
  --mood-great:#22c55e; --mood-good:#3b82f6; --mood-meh:#f59e0b;
  --mood-bad:#f97316; --mood-awful:#f43f5e;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:relative;z-index:100;flex-shrink:0;}
.topbar-logo{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:7px;}
.topbar-logo span{color:var(--accent);}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;}
.date-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 14px;}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:1px 4px;transition:color 0.15s;line-height:1;}
.date-nav button:hover{color:var(--text);}
#dateLabel{font-size:0.88rem;font-weight:600;min-width:90px;text-align:center;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-sm{padding:5px 12px;border-radius:7px;font-family:'Nunito','Noto Sans KR',sans-serif;font-size:0.73rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.15s;}
.btn-sm:hover{color:var(--text);border-color:var(--accent);}
.btn-sm.hl{border-color:var(--accent);color:var(--accent);}
.btn-sm.hl:hover{background:rgba(108,99,255,0.08);}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.main{flex:1;display:grid;grid-template-columns:292px 1fr 260px;gap:0;overflow:hidden;min-height:0;}

/* ── 왼쪽 ── */
.left-col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
.left-col::-webkit-scrollbar{width:3px;}
.left-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* 달력 */
.cal-section{padding:14px 14px 10px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-head-title{font-size:0.88rem;font-weight:700;}
.cal-head-nav{display:flex;gap:2px;}
.cal-nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 5px;border-radius:5px;transition:all 0.15s;}
.cal-nav-btn:hover{color:var(--text);background:var(--surface2);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
.cal-dow span{text-align:center;font-size:0.58rem;font-weight:700;color:var(--muted);padding:2px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;position:relative;transition:all 0.15s;font-size:0.73rem;font-weight:500;}
.cal-day:hover{background:var(--surface2);}
.cal-day.empty{cursor:default;pointer-events:none;}
.cal-day.today{background:rgba(108,99,255,0.08);color:var(--accent);font-weight:800;}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700;}
.cal-day.selected:hover{background:#5a52d5;}
.cal-day.has-entry::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-day.mood-great.has-entry::after{background:var(--mood-great);}
.cal-day.mood-good.has-entry::after{background:var(--mood-good);}
.cal-day.mood-meh.has-entry::after{background:var(--mood-meh);}
.cal-day.mood-bad.has-entry::after{background:var(--mood-bad);}
.cal-day.mood-awful.has-entry::after{background:var(--mood-awful);}
.cal-day.selected::after{background:rgba(255,255,255,0.8) !important;}

/* 통계 */
.stats-section{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;}
.section-title{font-size:0.62rem;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}

/* 연속기록 */
.streak-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.streak-left{display:flex;flex-direction:column;gap:2px;}
.streak-lbl{font-size:0.6rem;color:var(--muted);}
.streak-val{font-size:1.3rem;font-weight:800;color:var(--gold);line-height:1.1;}
.streak-icon{font-size:1.5rem;opacity:0.6;}

/* 감정분포 */
.mood-dist{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.mood-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.mood-bar-row:last-child{margin-bottom:0;}
.mood-emoji{font-size:0.82rem;width:18px;text-align:center;flex-shrink:0;}
.mood-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.mood-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.mood-bar-cnt{font-size:0.6rem;font-weight:700;color:var(--muted);width:14px;text-align:right;flex-shrink:0;}

/* 올해의 감정 */
.year-mood{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.year-mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px;}
.ym-cell{border-radius:7px;padding:5px 3px;text-align:center;background:var(--surface);border:1px solid var(--border);transition:transform 0.15s;cursor:default;}
.ym-cell:hover{transform:scale(1.07);}
.ym-cell.has-data{border-color:transparent;}
.ym-cell.has-data.great{background:rgba(34,197,94,0.13);}
.ym-cell.has-data.good{background:rgba(59,130,246,0.13);}
.ym-cell.has-data.meh{background:rgba(245,158,11,0.13);}
.ym-cell.has-data.bad{background:rgba(249,115,22,0.13);}
.ym-cell.has-data.awful{background:rgba(244,63,94,0.13);}
.ym-month{font-size:0.52rem;color:var(--muted);font-weight:700;display:block;margin-bottom:2px;}
.ym-emoji{font-size:1rem;line-height:1;display:block;}
.ym-empty{font-size:0.65rem;color:var(--border);line-height:1.8;display:block;}

/* ── 에디터 ── */
.center-col{display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg);}
.editor-top{padding:12px 22px 10px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);}
.editor-date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.editor-date{font-size:0.95rem;font-weight:700;}
.editor-date .weekday{font-size:0.73rem;font-weight:400;color:var(--muted);margin-left:7px;}
.mood-picker{display:flex;gap:4px;}
.mood-btn{width:30px;height:30px;border-radius:7px;border:2px solid transparent;background:var(--surface2);cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.mood-btn:hover{transform:scale(1.15);}
.mood-btn.active{transform:scale(1.1);}
.mood-btn[data-mood="great"].active{border-color:var(--mood-great);background:rgba(34,197,94,0.1);}
.mood-btn[data-mood="good"].active{border-color:var(--mood-good);background:rgba(59,130,246,0.1);}
.mood-btn[data-mood="meh"].active{border-color:var(--mood-meh);background:rgba(245,158,11,0.1);}
.mood-btn[data-mood="bad"].active{border-color:var(--mood-bad);background:rgba(249,115,22,0.1);}
.mood-btn[data-mood="awful"].active{border-color:var(--mood-awful);background:rgba(244,63,94,0.1);}

/* 제목 입력 */
.title-inp{width:100%;background:transparent;border:none;outline:none;font-family:'Nunito','Noto Sans KR',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:7px;border-bottom:1px solid transparent;transition:border-color 0.2s;padding-bottom:4px;}
.title-inp:focus{border-bottom-color:var(--border);}
.title-inp::placeholder{color:#c8cad8;font-weight:600;}

/* 날씨 */
.weather-row{display:flex;align-items:center;gap:3px;margin-bottom:7px;}
.weather-lbl{font-size:0.63rem;color:var(--muted);margin-right:3px;}
.weather-btn{background:none;border:1.5px solid transparent;border-radius:6px;padding:2px 4px;font-size:0.85rem;cursor:pointer;transition:all 0.15s;line-height:1;}
.weather-btn:hover{background:var(--surface2);}
.weather-btn.active{border-color:var(--accent);background:rgba(108,99,255,0.08);}

/* 태그 */
.tag-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;background:rgba(108,99,255,0.08);color:var(--accent);font-size:0.67rem;font-weight:700;cursor:default;border:1px solid rgba(108,99,255,0.2);transition:all 0.15s;}
.tag:hover{background:rgba(108,99,255,0.15);}
.tag .del{color:var(--muted);font-size:0.75rem;margin-left:1px;cursor:pointer;}
.tag-inp{background:none;border:1px dashed var(--border);border-radius:20px;padding:2px 7px;font-size:0.67rem;color:var(--text);outline:none;font-family:'Nunito',sans-serif;width:68px;transition:border-color 0.15s;}
.tag-inp:focus{border-color:var(--accent);}
.tag-inp::placeholder{color:var(--muted);}

/* 에디터 본문 */
.editor-body{flex:1;overflow-y:auto;padding:18px 22px;min-height:0;}
.editor-body::-webkit-scrollbar{width:4px;}
.editor-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.diary-textarea{width:100%;height:100%;min-height:200px;font-family:'Nunito','Noto Sans KR',sans-serif;font-size:0.97rem;font-weight:400;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.95;}
.diary-textarea::placeholder{color:#c8cad8;}

/* 읽기모드 텍스트 */
.read-body{font-family:'Nunito','Noto Sans KR',sans-serif;font-size:0.97rem;line-height:1.95;white-space:pre-wrap;word-break:break-all;color:var(--text);}
.read-body.no-content{color:var(--muted);font-style:italic;font-size:0.88rem;}
/* 읽기모드일때 헤더 잠금 */
.is-read-mode .title-inp{pointer-events:none;}
.is-read-mode .mood-btn{pointer-events:none;cursor:default;}
.is-read-mode .weather-btn{pointer-events:none;cursor:default;}
.is-read-mode .weather-btn:not(.active){opacity:0.18;}
.is-read-mode .tag-inp{display:none;}
.is-read-mode .tag .del{display:none;}
.is-read-mode .tag{cursor:default;}
.is-read-mode .tag:hover{background:rgba(108,99,255,0.08);}

/* 하단 */
.editor-bottom{padding:8px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
.bottom-left{display:flex;align-items:center;gap:10px;}
.char-count{font-size:0.7rem;color:var(--muted);}
.char-count span{color:var(--accent);font-weight:700;}
.autosave{font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.autosave .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.autosave .dot.saving{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.delete-btn{padding:5px 10px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:7px;font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.delete-btn:hover{color:var(--mood-awful);border-color:var(--mood-awful);}
.save-btn{padding:7px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.save-btn:hover{background:#5a52d5;transform:translateY(-1px);}
.save-btn:active{transform:translateY(0);}
.save-btn.edit-mode{background:var(--gold);}
.save-btn.edit-mode:hover{background:#d97706;}
.save-btn.confirmed{background:var(--green);}

/* ── 오른쪽 ── */
.right-col{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
.right-head{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.right-head-title{font-size:0.82rem;font-weight:700;}
.search-wrap{padding:10px 14px 6px;flex-shrink:0;}
.search-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:'Nunito','Noto Sans KR',sans-serif;font-size:0.77rem;outline:none;transition:border-color 0.2s;}
.search-inp:focus{border-color:var(--accent);}
.search-inp::placeholder{color:var(--muted);}
.diary-list{flex:1;overflow-y:auto;min-height:0;}
.diary-list::-webkit-scrollbar{width:3px;}
.diary-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.diary-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;gap:3px;}
.diary-item:hover{background:rgba(108,99,255,0.04);}
.diary-item.active{background:rgba(108,99,255,0.07);}
.di-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.di-date{font-size:0.68rem;font-weight:700;color:var(--muted);}
.di-mood{font-size:0.82rem;}
.di-title{font-size:0.82rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-title.no-title{color:var(--muted);font-style:italic;font-weight:400;font-size:0.75rem;}
.di-tags{display:flex;gap:3px;flex-wrap:wrap;}
.di-tag{font-size:0.57rem;font-weight:700;color:var(--accent);background:rgba(108,99,255,0.08);border-radius:10px;padding:1px 5px;}
.diary-empty{padding:30px 14px;text-align:center;color:var(--muted);font-size:0.8rem;line-height:2;}
.diary-empty .ei{font-size:2rem;margin-bottom:8px;}

/* 토스트 */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:0.82rem;font-weight:600;opacity:0;pointer-events:none;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:900px){.main{grid-template-columns:1fr;}.left-col,.right-col{display:none;}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">🤬 <span>마이니치데스노트</span></div>
    <div class="topbar-center">
      <div class="date-nav">
        <button id="prevDayBtn">‹</button>
        <span id="dateLabel"></span>
        <button id="nextDayBtn">›</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm" id="todayBtn">오늘</button>
      <button class="btn-sm hl" id="exportBtn">📤 내보내기</button>
    </div>
  </div>

  <div class="main">
    <!-- 왼쪽 -->
    <div class="left-col">
      <div class="cal-section">
        <div class="cal-head">
          <span class="cal-head-title" id="calMonthLabel"></span>
          <div class="cal-head-nav">
            <button class="cal-nav-btn" id="calPrevBtn">‹</button>
            <button class="cal-nav-btn" id="calNextBtn">›</button>
          </div>
        </div>
        <div class="cal-dow">
          <span style="color:#f87171">일</span><span>월</span><span>화</span>
          <span>수</span><span>목</span><span>금</span><span style="color:var(--blue)">토</span>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>

      <div class="stats-section">
        <div class="streak-card">
          <div class="streak-left">
            <span class="streak-lbl">🔥 연속 기록</span>
            <span class="streak-val" id="statStreak">0일</span>
          </div>
          <span class="streak-icon">🔥</span>
        </div>
        <div class="mood-dist" id="moodDist"></div>
        <div class="year-mood" id="yearMood"></div>
      </div>
    </div>

    <!-- 에디터 -->
    <div class="center-col">
      <div class="editor-top">
        <div class="editor-date-row">
          <div class="editor-date" id="editorDateFull"></div>
          <div class="mood-picker">
            <button class="mood-btn" data-mood="great" title="아주 좋아요">😄</button>
            <button class="mood-btn" data-mood="good"  title="좋아요">🙂</button>
            <button class="mood-btn" data-mood="meh"   title="그저 그래요">😐</button>
            <button class="mood-btn" data-mood="bad"   title="별로예요">😔</button>
            <button class="mood-btn" data-mood="awful" title="최악이에요">😞</button>
          </div>
        </div>
        <input class="title-inp" id="titleInp" spellcheck="false" placeholder="제목을 입력하세요 (선택)">
        <div class="weather-row">
          <span class="weather-lbl">날씨</span>
          <button class="weather-btn" data-weather="☀️">☀️</button>
          <button class="weather-btn" data-weather="⛅">⛅</button>
          <button class="weather-btn" data-weather="☁️">☁️</button>
          <button class="weather-btn" data-weather="🌧️">🌧️</button>
          <button class="weather-btn" data-weather="❄️">❄️</button>
          <button class="weather-btn" data-weather="⛈️">⛈️</button>
        </div>
        <div class="tag-row" id="tagRow">
          <input class="tag-inp" id="tagInp" placeholder="# 태그 추가">
        </div>
      </div>

      <div class="editor-body" id="editorBody">
        <div class="read-body" id="readBody" style="display:none;"></div>
        <textarea class="diary-textarea" id="diaryTextarea" spellcheck="false"
          placeholder="오늘 하루는..."></textarea>
      </div>

      <div class="editor-bottom">
        <div class="bottom-left">
          <div class="autosave" id="autosaveIndicator"><div class="dot"></div><span>저장됨</span></div>
          <div class="char-count"><span id="charCount">0</span>자</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="delete-btn" id="deleteBtn">삭제</button>
          <button class="save-btn" id="saveBtn">
            <span id="saveBtnIcon">💾</span>
            <span id="saveBtnText">저장하기</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 오른쪽 -->
    <div class="right-col">
      <div class="right-head">
        <span class="right-head-title">📚 일기 목록</span>
        <span id="totalCount" style="font-size:0.72rem;color:var(--muted);">0개</span>
      </div>
      <div class="search-wrap">
        <input class="search-inp" id="searchInp" placeholder="🔍 일기 검색...">
      </div>
      <div class="diary-list" id="diaryList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let diaries = {};
let currentDate = todayStr();
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth() + 1;
let autosaveTimer = null;
let currentMood = '';
let currentWeather = '';
let currentTags = [];
let isReadMode = false;

const MOOD_EMOJI = { great:'😄', good:'🙂', meh:'😐', bad:'😔', awful:'😞' };
const MOOD_LABEL = { great:'아주 좋아요', good:'좋아요', meh:'그저 그래요', bad:'별로예요', awful:'최악이에요' };
const MOOD_COLOR = { great:'var(--mood-great)', good:'var(--mood-good)', meh:'var(--mood-meh)', bad:'var(--mood-bad)', awful:'var(--mood-awful)' };
const WEEKDAYS   = ['일','월','화','수','목','금','토'];
const MONTHS     = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function formatDateFull(s){ const [y,m,d]=s.split('-').map(Number); return `${y}년 ${m}월 ${d}일`; }
function getWeekday(s){ return WEEKDAYS[parseDate(s).getDay()]+'요일'; }
function offsetDate(s,n){ const d=parseDate(s); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadData(){ try{ diaries=JSON.parse(localStorage.getItem('haru_diaries')||'{}'); }catch(e){ diaries={}; } }
function saveData(){ try{ localStorage.setItem('haru_diaries',JSON.stringify(diaries)); }catch(e){} }

// ── 읽기/쓰기 모드 전환 ───────────────
function setMode(mode) {
  isReadMode = (mode === 'read');
  const centerCol = document.querySelector('.center-col');
  const textarea  = document.getElementById('diaryTextarea');
  const readBody  = document.getElementById('readBody');
  const charWrap  = document.querySelector('.char-count');
  const autoWrap  = document.getElementById('autosaveIndicator');
  const btn       = document.getElementById('saveBtn');

  if (isReadMode) {
    centerCol.classList.add('is-read-mode');
    textarea.style.display = 'none';
    const txt = textarea.value.trim();
    readBody.textContent = txt || '내용이 없어요.';
    readBody.className = 'read-body' + (txt ? '' : ' no-content');
    readBody.style.display = 'block';
    charWrap.style.visibility = 'hidden';
    autoWrap.style.visibility = 'hidden';
    btn.classList.remove('confirmed');
    btn.classList.add('edit-mode');
    document.getElementById('saveBtnIcon').textContent = '✏️';
    document.getElementById('saveBtnText').textContent = '수정하기';
  } else {
    centerCol.classList.remove('is-read-mode');
    readBody.style.display = 'none';
    textarea.style.display = '';
    charWrap.style.visibility = '';
    autoWrap.style.visibility = '';
    btn.classList.remove('confirmed', 'edit-mode');
    document.getElementById('saveBtnIcon').textContent = '💾';
    document.getElementById('saveBtnText').textContent = '저장하기';
    setTimeout(() => textarea.focus(), 30);
  }
}

// ── 저장버튼 상태 ──────────────────────
function updateSaveBtn() {
  if (isReadMode) return;
  const btn = document.getElementById('saveBtn');
  btn.classList.remove('confirmed', 'edit-mode');
  document.getElementById('saveBtnIcon').textContent = '💾';
  document.getElementById('saveBtnText').textContent = '저장하기';
}

// ── 에디터 로드 ───────────────────────
function loadEditor(dateStr) {
  currentDate = dateStr;
  const [y,m,d] = dateStr.split('-').map(Number);
  document.getElementById('dateLabel').textContent = `${y}년 ${m}월 ${d}일`;
  document.getElementById('editorDateFull').innerHTML = formatDateFull(dateStr)+` <span class="weekday">${getWeekday(dateStr)}</span>`;

  const entry = diaries[dateStr] || {};
  document.getElementById('titleInp').value = entry.title || '';
  document.getElementById('diaryTextarea').value = entry.text || '';
  updateCharCount();

  currentMood = entry.mood || '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.dataset.mood===currentMood));

  currentWeather = entry.weather || '';
  document.querySelectorAll('.weather-btn').forEach(b => b.classList.toggle('active', b.dataset.weather===currentWeather));

  currentTags = entry.tags ? [...entry.tags] : [];
  renderTags();
  updateAutosaveLabel('saved');
  renderCalendar();
  renderDiaryList();

  // 등록된 일기면 읽기모드, 없으면 쓰기모드
  if (diaries[dateStr]) {
    setMode('read');
  } else {
    setMode('write');
  }
}

// ── 저장 ──────────────────────────────
function saveEntry(auto=false) {
  const title = document.getElementById('titleInp').value.trim();
  const text  = document.getElementById('diaryTextarea').value.trim();

  if (!title && !text && !currentMood && !currentWeather && !currentTags.length) {
    delete diaries[currentDate];
  } else {
    diaries[currentDate] = { title, text, mood:currentMood, weather:currentWeather, tags:[...currentTags], savedAt:new Date().toISOString() };
  }
  saveData();
  updateAutosaveLabel('saved');
  renderCalendar();
  renderDiaryList();
  renderStats();

  if (!auto) {
    const btn = document.getElementById('saveBtn');
    btn.classList.remove('edit-mode');
    btn.classList.add('confirmed');
    document.getElementById('saveBtnIcon').textContent = '✅';
    document.getElementById('saveBtnText').textContent = '저장됨!';
    showToast('일기가 저장되었어요 ✍️');
    setTimeout(() => {
      if (diaries[currentDate]) setMode('read');
      else updateSaveBtn();
    }, 900);
  } else {
    updateSaveBtn();
  }
}

function autoSave() {
  clearTimeout(autosaveTimer);
  updateAutosaveLabel('saving');
  autosaveTimer = setTimeout(() => saveEntry(true), 1200);
}

function updateAutosaveLabel(state) {
  const dot = document.querySelector('#autosaveIndicator .dot');
  const lbl = document.querySelector('#autosaveIndicator span');
  if (state==='saving') { dot.classList.add('saving'); lbl.textContent='저장 중...'; }
  else { dot.classList.remove('saving'); lbl.textContent=diaries[currentDate]?'저장됨':'미저장'; }
}

function updateCharCount() {
  document.getElementById('charCount').textContent = document.getElementById('diaryTextarea').value.length.toLocaleString('ko-KR');
}

// ── 태그 ──────────────────────────────
function renderTags() {
  const row = document.getElementById('tagRow');
  const inp = document.getElementById('tagInp');
  row.querySelectorAll('.tag').forEach(t=>t.remove());
  currentTags.forEach((tag,i) => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.innerHTML = `#${escHtml(tag)} <span class="del">×</span>`;
    el.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); currentTags.splice(i,1); renderTags(); autoSave(); });
    row.insertBefore(el, inp);
  });
}
function addTag(val) {
  const t = val.trim().replace(/^#/,'');
  if (!t || currentTags.includes(t)) return;
  currentTags.push(t); renderTags(); autoSave();
}

// ── 달력 ──────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${calYear}년 ${MONTHS[calMonth-1]}`;
  const firstDay = new Date(calYear,calMonth-1,1).getDay();
  const lastDate = new Date(calYear,calMonth,0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  let html='';
  for (let i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';
  for (let d=1;d<=lastDate;d++) {
    const ds=`${calYear}-${pad(calMonth)}-${pad(d)}`;
    const isToday=new Date(calYear,calMonth-1,d).getTime()===today.getTime();
    const entry=diaries[ds];
    const moodCls=entry?.mood?` mood-${entry.mood}`:'';
    html+=`<div class="cal-day${isToday?' today':''}${ds===currentDate?' selected':''}${entry?' has-entry':''}${moodCls}" data-date="${ds}">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
  document.getElementById('calDays').querySelectorAll('.cal-day:not(.empty)').forEach(el=>{
    el.addEventListener('click',()=>loadEditor(el.dataset.date));
  });
}

// ── 통계 ──────────────────────────────
function renderStats() {
  // 연속기록 (전체 누적)
  let streak=0, d=new Date(); d.setHours(0,0,0,0);
  while(true){
    const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if(diaries[ds]){streak++;d.setDate(d.getDate()-1);}else break;
  }
  document.getElementById('statStreak').textContent=streak+'일';

  // 이번달 감정 분포
  const prefix=`${calYear}-${pad(calMonth)}`;
  const monthEntries=Object.entries(diaries).filter(([k])=>k.startsWith(prefix));
  const moods={great:0,good:0,meh:0,bad:0,awful:0};
  monthEntries.forEach(([,v])=>{ if(v.mood) moods[v.mood]++; });
  const maxM=Math.max(...Object.values(moods),1);
  document.getElementById('moodDist').innerHTML=
    `<div class="section-title" style="margin-bottom:8px;">😊 ${calYear}년 ${MONTHS[calMonth-1]} 감정</div>`+
    Object.entries(moods).map(([mood,cnt])=>
      `<div class="mood-bar-row">
        <span class="mood-emoji">${MOOD_EMOJI[mood]}</span>
        <div class="mood-bar-bg"><div class="mood-bar-fill" style="width:${Math.round(cnt/maxM*100)}%;background:${MOOD_COLOR[mood]};"></div></div>
        <span class="mood-bar-cnt">${cnt}</span>
      </div>`
    ).join('');

  // 올해의 감정 — 12개월 그리드, 각 월 최다 감정
  const year=new Date().getFullYear();
  const cells=Array.from({length:12},(_,i)=>{
    const mp=`${year}-${pad(i+1)}`;
    const entries=Object.entries(diaries).filter(([k])=>k.startsWith(mp));
    if(!entries.length) return {m:i+1,mood:null};
    const mc={great:0,good:0,meh:0,bad:0,awful:0};
    entries.forEach(([,v])=>{ if(v.mood) mc[v.mood]++; });
    const top=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
    return {m:i+1, mood:top[1]>0?top[0]:null};
  });
  document.getElementById('yearMood').innerHTML=
    `<div class="section-title">✨ ${year}년 감정 기록</div>
    <div class="year-mood-grid">`+
    cells.map(c=>
      `<div class="ym-cell${c.mood?` has-data ${c.mood}`:''}">
        <span class="ym-month">${c.m}월</span>
        ${c.mood?`<span class="ym-emoji">${MOOD_EMOJI[c.mood]}</span>`:`<span class="ym-empty">·</span>`}
      </div>`
    ).join('')+
    '</div>';
}

// ── 일기 목록 ─────────────────────────
function renderDiaryList() {
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  const all=Object.entries(diaries)
    .filter(([k,v])=>{
      if(!q) return true;
      return v.title?.toLowerCase().includes(q)||v.text?.toLowerCase().includes(q)||v.tags?.some(t=>t.toLowerCase().includes(q));
    })
    .sort(([a],[b])=>b.localeCompare(a));

  document.getElementById('totalCount').textContent=Object.keys(diaries).length+'개';
  const el=document.getElementById('diaryList');
  if(!all.length){
    el.innerHTML=`<div class="diary-empty"><div class="ei">${q?'🔍':'📖'}</div>${q?'검색 결과가 없어요.':'아직 작성한 일기가 없어요.<br>오늘의 하루를 기록해 보세요!'}</div>`;
    return;
  }
  el.innerHTML=all.map(([date,entry])=>{
    const [y,m,d]=date.split('-').map(Number);
    const dateDisp=`${y}.${pad(m)}.${pad(d)} ${WEEKDAYS[parseDate(date).getDay()]}`;
    const tagsHtml=entry.tags?.length?entry.tags.map(t=>`<span class="di-tag">#${escHtml(t)}</span>`).join(''):'';
    const title=entry.title?.trim()||'';
    return `<div class="diary-item${date===currentDate?' active':''}" data-date="${date}">
      <div class="di-top">
        <span class="di-date">${dateDisp}</span>
        <span class="di-mood">${entry.mood?MOOD_EMOJI[entry.mood]:''}${entry.weather||''}</span>
      </div>
      <div class="di-title${title?'':' no-title'}">${title?escHtml(title):'제목 없음'}</div>
      ${tagsHtml?`<div class="di-tags">${tagsHtml}</div>`:''}
    </div>`;
  }).join('');
  el.querySelectorAll('.diary-item').forEach(item=>{
    item.addEventListener('click',()=>loadEditor(item.dataset.date));
  });
}

// ── 내보내기 ──────────────────────────
function exportDiaries() {
  const all=Object.entries(diaries).sort(([a],[b])=>a.localeCompare(b));
  if(!all.length){showToast('내보낼 일기가 없어요.');return;}
  const lines=all.map(([date,e])=>{
    const p=[`📅 ${formatDateFull(date)} (${getWeekday(date)})`];
    if(e.title) p.push(`📌 ${e.title}`);
    if(e.mood)  p.push(`😊 오늘의 감정: ${MOOD_LABEL[e.mood]}`);
    if(e.weather) p.push(`${e.weather} 날씨`);
    if(e.tags?.length) p.push(`🏷 태그: ${e.tags.map(t=>'#'+t).join(' ')}`);
    p.push(''); p.push(e.text||'(내용 없음)'); p.push('\n---\n');
    return p.join('\n');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+lines.join('\n')],{type:'text/plain;charset=utf-8'}));
  a.download=`하루일기_${new Date().toISOString().split('T')[0]}.txt`;
  a.click();
  showToast('일기를 내보냈어요 📤');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── init ──────────────────────────────
function syncCalMonth(){
  const [y,m]=currentDate.split('-').map(Number);
  calYear=y; calMonth=m; renderCalendar(); renderStats();
}

function init() {
  loadData();
  loadEditor(currentDate);
  renderStats();

  document.getElementById('prevDayBtn').addEventListener('click',()=>{ loadEditor(offsetDate(currentDate,-1)); syncCalMonth(); });
  document.getElementById('nextDayBtn').addEventListener('click',()=>{ const n=offsetDate(currentDate,1); if(n<=todayStr()){ loadEditor(n); syncCalMonth(); } });
  document.getElementById('todayBtn').addEventListener('click',()=>{ loadEditor(todayStr()); syncCalMonth(); });

  document.getElementById('calPrevBtn').addEventListener('click',()=>{ calMonth--; if(calMonth<1){calMonth=12;calYear--;} renderCalendar(); renderStats(); });
  document.getElementById('calNextBtn').addEventListener('click',()=>{ calMonth++; if(calMonth>12){calMonth=1;calYear++;} renderCalendar(); renderStats(); });

  document.getElementById('titleInp').addEventListener('input', autoSave);
  document.getElementById('diaryTextarea').addEventListener('input',()=>{ updateCharCount(); autoSave(); });
  document.getElementById('saveBtn').addEventListener('click',()=>{
    if (isReadMode) setMode('write');
    else saveEntry(false);
  });

  document.getElementById('deleteBtn').addEventListener('click',()=>{
    if(!diaries[currentDate]){showToast('삭제할 일기가 없어요.');return;}
    if(!confirm('이 날의 일기를 삭제할까요?')) return;
    delete diaries[currentDate]; saveData(); loadEditor(currentDate); showToast('일기를 삭제했어요.');
  });

  document.querySelectorAll('.mood-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if (isReadMode) return;
      currentMood=currentMood===btn.dataset.mood?'':btn.dataset.mood;
      document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('active',b.dataset.mood===currentMood));
      autoSave();
    });
  });

  document.querySelectorAll('.weather-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if (isReadMode) return;
      currentWeather=currentWeather===btn.dataset.weather?'':btn.dataset.weather;
      document.querySelectorAll('.weather-btn').forEach(b=>b.classList.toggle('active',b.dataset.weather===currentWeather));
      autoSave();
    });
  });

  const tagInp=document.getElementById('tagInp');
  tagInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(tagInp.value);tagInp.value='';}
    if(e.key==='Backspace'&&!tagInp.value&&currentTags.length){currentTags.pop();renderTags();autoSave();}
  });
  tagInp.addEventListener('blur',()=>{ if(tagInp.value.trim()){addTag(tagInp.value);tagInp.value='';} });

  document.getElementById('searchInp').addEventListener('input',renderDiaryList);
  document.getElementById('exportBtn').addEventListener('click',exportDiaries);
  document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); if(!isReadMode) saveEntry(false); } });
}

init();
</script>
</body>
</html>
